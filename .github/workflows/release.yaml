name: Release CRX Extension

on:
  push:
    tags:
      - 'v*'              # 匹配 v1.0.0, v2.3.1 等格式的 tag

permissions:
  contents: write         # 创建 Release 所需权限

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 从 manifest.json 读取版本号
      - name: Get version from manifest
        id: get_version
        run: |
          MANIFEST_VERSION=$(jq -r '.version' manifest.json)
          echo "manifest_version=$MANIFEST_VERSION" >> $GITHUB_OUTPUT
          echo "tag_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # 校验 tag 版本与 manifest 版本是否一致
      - name: Check version consistency
        run: |
          if [ "${{ steps.get_version.outputs.manifest_version }}" != "${{ steps.get_version.outputs.tag_version }}" ]; then
            echo "❌ 版本不一致: manifest.json 为 ${{ steps.get_version.outputs.manifest_version }}，tag 为 ${{ steps.get_version.outputs.tag_version }}"
            exit 1
          fi
          echo "✅ 版本一致: v${{ steps.get_version.outputs.manifest_version }}"

      # 打包扩展目录为 zip（如果项目需要先构建，在此步骤之前加入构建命令）
      - name: Pack extension directory
        id: pack_extension
        uses: cardinalby/webext-buildtools-pack-extension-dir-action@v1
        with:
          extensionDir: '.'          # 扩展根目录，根据实际情况修改
          zipFilePath: 'build/extension.zip'

      # 打包为 .crx 并签名
      - name: Build .crx file
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: 'build/extension.zip'
          crxFilePath: 'build/extension.crx'
          privateKey: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}

      # 创建 GitHub Release 并上传 .crx
      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.get_version.outputs.manifest_version }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## 浏览器插件 v${{ steps.get_version.outputs.manifest_version }}
            
            请下载 `.crx` 文件安装。
          files: build/extension.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}